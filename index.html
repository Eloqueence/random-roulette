<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Випадкова рулетка</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#0f172a;
color:white;
}

button{
padding:15px 30px;
font-size:20px;
background:#22c55e;
border:none;
border-radius:10px;
cursor:pointer;
}

#result{
font-size:40px;
margin:30px;
}
</style>
</head>

<body>

<h1>🎰 Випадкова рулетка</h1>

<div id="result">Натисни кнопку</div>

<button onclick="spin()">Крутити</button>

<script>
function spin(){
let number = Math.floor(Math.random()*37);
document.getElementById("result").innerText="Випало: "+number;
}
</script>

</body>
</html>
